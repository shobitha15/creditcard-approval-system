{% extends 'base.html' %}{% block content %}<h1>Credit card application</h1><p class="text-muted">Complete all fields for an instant assessment.</p><form method="post" class="card p-4" id="application-form"><div class="row g-3"><div class="col-md-3"><label>Age</label><input required min="18" max="100" type="number" name="age" class="form-control"></div><div class="col-md-3"><label>Gender</label><select required name="gender" class="form-select"><option>Female</option><option>Male</option><option>Other</option></select></div><div class="col-md-3"><label>Annual income ($)</label><input required min="1" type="number" step="0.01" name="annual_income" class="form-control"></div><div class="col-md-3"><label>Monthly income ($)</label><input required min="1" type="number" step="0.01" name="monthly_income" class="form-control"></div><div class="col-md-3"><label>Employment type</label><select name="employment_type" class="form-select"><option>Salaried</option><option>Self-employed</option><option>Business</option><option>Unemployed</option></select></div><div class="col-md-3"><label>Employment years</label><input required min="0" type="number" step=".1" name="employment_duration" class="form-control"></div><div class="col-md-3"><label>Education</label><select name="education" class="form-select"><option>High School</option><option>Bachelor</option><option>Master</option><option>Doctorate</option></select></div><div class="col-md-3"><label>Marital status</label><select name="marital_status" class="form-select"><option>Single</option><option>Married</option><option>Divorced</option></select></div><div class="col-md-3"><label>Existing loan ($)</label><input required min="0" type="number" step=".01" name="existing_loan_amount" class="form-control"></div><div class="col-md-3"><label>Credit inquiries</label><input required min="0" type="number" name="credit_inquiries" class="form-control"></div><div class="col-md-3"><label>Credit history (years)</label><input required min="0" type="number" step=".1" name="credit_history" class="form-control"></div><div class="col-md-3"><label>Outstanding debt ($)</label><input required min="0" type="number" step=".01" name="outstanding_debt" class="form-control"></div><div class="col-md-3"><label>Payment history (%)</label><input required min="0" max="100" type="number" step=".1" name="payment_history" class="form-control"></div><div class="col-md-3"><label>Housing type</label><select name="housing_type" class="form-select"><option>Own</option><option>Rent</option><option>Mortgage</option></select></div><div class="col-md-3"><label>Occupation</label><select name="occupation" class="form-select"><option>Professional</option><option>Manager</option><option>Clerical</option><option>Service</option><option>Technician</option><option>Student</option></select></div></div><button class="btn btn-primary mt-4" id="submit-button">Assess application</button></form><script>document.getElementById('application-form').addEventListener('submit',()=>{document.getElementById('submit-button').textContent='Assessing…';});</script>{% endblock %}
