<div class="table-responsive"><table class="table table-hover bg-white"><thead><tr><th>Date</th><th>Income</th><th>Decision</th><th>Probability</th><th></th></tr></thead><tbody>{% for a in apps %}<tr><td>{{a.submitted_at.strftime('%d %b %Y')}}</td><td>${{ '{:,.0f}'.format(a.annual_income) }}</td><td><span class="badge text-bg-{{'success' if a.prediction.decision=='Approved' else 'danger'}}">{{a.prediction.decision}}</span></td><td>{{a.prediction.probability}}%</td><td><a href="/result/{{a.id}}">View</a></td></tr>{% else %}<tr><td colspan="5" class="text-center text-muted py-4">No applications yet.</td></tr>{% endfor %}</tbody></table></div>
